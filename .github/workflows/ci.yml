name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate OpenAPI client
        run: make generate

      - name: Check generated drift
        run: git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
